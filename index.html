---
layout: default
---

<div style="text-align:center;">
  <a id="imageLink" href="" target="_blank" rel="noopener noreferrer"
     style="position: relative; display: inline-block;">
    <img id="viewer" alt="ÁĒĽŚÉŹ"
         style="max-height:80vh;">
    <div id="max-viewers" style="
      position: absolute;
      top: 0;
      right: 0;
      color: black;
      padding: 4px 8px;
      font-size: 14px;
      border-radius: 4px;
      pointer-events: none;
    ">--:--&#9;-----</div>
  </a>
</div>
<div style="text-align:center;">
  <button onclick="location.href='https://boxpush.github.io/b/';">ŚźćŚČć„Āā„āäÁČą</button>
  <button id="prev">‚Üź</button>
  <input type="text" id="dateInput" placeholder="yyyymmdd" style="font-size:1.2rem; width:120px; text-align:center;">
  <button id="next">‚Üí</button>
  <button id="autoReloadBtn">Ťá™ŚčēśõīśĖį(5ŚąÜśĮé): OFF</button>
  <span id="countdown"></span>
</div>
<script>
  const startDate = new Date(2025, 7, 8); // 2025-08-08ťĖčŚßčÔľą0-based„Ā™„Āģ„Āß7„ĀĮ8śúąÔľČ
  const today = new Date(new Date().getTime() - 10 * 60 * 1000);
  const daysSinceStart = Math.floor((today - startDate) / (1000*60*60*24));
  let offset = daysSinceStart;

  let autoReload = false;
  let countdownSeconds = 300;
  let countdownIntervalId = null;

  const img = document.getElementById('viewer');
  const btn = document.getElementById('autoReloadBtn');
  const countdownElem = document.getElementById('countdown');

  // ŚąĚśúüÁä∂śÖč„ĀęŚźą„āŹ„Āõ„Ā¶„āĮ„É©„āĻ„āí„āĽ„ÉÉ„ÉąÔľąautoReload „ĀĆśóĘ„Āę„Āā„āč„Ā™„āČ„ĀĚ„āĆ„āíšĹŅ„ĀÜÔľČ
  btn.classList.toggle('active', autoReload);
  btn.classList.toggle('inactive', !autoReload);
  btn.setAttribute('aria-pressed', String(autoReload)); // ÁĒĽťĚĘ„É™„Éľ„ÉÄ„ÉľŚĮĺŚŅú

  btn.addEventListener('click', () => {
    autoReload = !autoReload;

    if (autoReload) {
      btn.textContent = 'Ťá™ŚčēśõīśĖį(5ŚąÜśĮé): ON';
      btn.classList.add('active');
      btn.classList.remove('inactive');
      btn.setAttribute('aria-pressed', 'true');

      countdownSeconds = 300;
      countdownElem.textContent = `${countdownSeconds}`;

      countdownIntervalId = setInterval(() => {
        countdownSeconds--;
        if (countdownSeconds <= 0) {
          countdownSeconds = 300;
          showImage();
        }
        countdownElem.textContent = `${countdownSeconds}`;
      }, 1000);
    } else {
      btn.textContent = 'Ťá™ŚčēśõīśĖį(5ŚąÜśĮé): OFF';
      btn.classList.remove('active');
      btn.classList.add('inactive');
      btn.setAttribute('aria-pressed', 'false');

      clearInterval(countdownIntervalId);
      countdownIntervalId = null;
      countdownElem.textContent = '';
    }
  });

  function getDateString(daysFromStart) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + daysFromStart);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}${m}${day}`;
  }

  function showImage() {
    const base = "https://f005.backblazeb2.com/file/boxpush/";
    const imgSrc = base + getDateString(offset) + "a.png";
    const txtSrc = "txt/" + getDateString(offset) + ".txt";
    const viewer = document.getElementById('viewer');
    viewer.src = imgSrc + '?t=' + new Date().getTime();

    // „É™„É≥„āĮ„Āģhref„Āę„āāÁĒĽŚÉŹURL„āí„āĽ„ÉÉ„Éą
    document.getElementById('imageLink').href = imgSrc;

    // „Éē„ā©„Éľ„É†„Āę„āāśó•šĽė„āíŚŹćśė†
    const d = new Date(startDate);
    d.setDate(d.getDate() + offset);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${y}${m}${day}`;
    fetch(txtSrc + '?t=' + new Date().getTime())
      .then(response => {
        if (!response.ok) throw new Error('');
        return response.text();
      })
      .then(text => {
        document.getElementById('max-viewers').textContent = text;
      })
      .catch(error => {
        document.getElementById('max-viewers').textContent = '';
      });
  }

  document.getElementById('prev').onclick = () => {
    offset = Math.max(0, offset - 1);
    showImage();
  };
  document.getElementById('next').onclick = () => {
    offset = Math.min(daysSinceStart, offset + 1);
    showImage();
  };

  document.getElementById('dateInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const val = this.value.trim();
      if (/^\d{8}$/.test(val)) {
        const y = parseInt(val.slice(0,4),10);
        const m = parseInt(val.slice(4,6),10);
        const d = parseInt(val.slice(6,8),10);
        const inputDate = new Date(y, m-1, d);
        if (inputDate >= startDate && inputDate <= today) {
          offset = Math.floor((inputDate - startDate) / (1000*60*60*24));
          showImage();
        }
      }
    }
  });

  showImage();
</script>
