---
layout: default
---

<style>
  .viewer-container {
    max-width: 90vw;            /* 画面幅の90%以内に制限 */
    aspect-ratio: 2 / 1;        /* 3600x1800の比率に近い（2:1） */
    margin: 1rem auto;
    text-align: center;
  }
  #viewer {
    width: 100%;
    height: auto;
    max-height: 80vh;           /* 画面高さの80%以内 */
    display: block;
    margin: 0 auto 1rem;
    border: 1px solid #ccc;
    box-shadow: 0 0 8px rgba(0,0,0,0.1);
  }
  .controls {
    display: flex;
    justify-content: center;
    gap: 1rem;
    align-items: center;
    margin-bottom: 1rem;
  }
  button {
    font-size: 1.5rem;
    padding: 0.3rem 0.8rem;
    cursor: pointer;
  }
  #dateInput {
    font-size: 1.2rem;
    width: 120px;
    text-align: center;
    padding: 0.2rem 0.4rem;
  }
</style>

<div class="viewer-container">
  <img id="viewer" alt="画像">
  
  <div class="controls">
    <button id="prev">←</button>
    <input type="text" id="dateInput" placeholder="yyyymmdd">
    <button id="next">→</button>
  </div>
</div>

<script>
  const startDate = new Date({{ 2025 }}, {{ 8 | minus: 1 }}, {{ 8 }}); // 2025-08-08開始
  const today = new Date({{ site.time | date: "%Y" }}, {{ site.time | date: "%m" | minus: 1 }}, {{ site.time | date: "%d" }});
  const daysSinceStart = Math.floor((today - startDate) / (1000*60*60*24));
  let offset = daysSinceStart;

  function getDateString(daysFromStart) {
    const d = new Date(startDate);
    d.setDate(d.getDate() + daysFromStart);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    return `${y}${m}${day}.png`;
  }

  function showImage() {
    document.getElementById('viewer').src = getDateString(offset);
    const d = new Date(startDate);
    d.setDate(d.getDate() + offset);
    const y = d.getFullYear();
    const m = String(d.getMonth() + 1).padStart(2, '0');
    const day = String(d.getDate()).padStart(2, '0');
    document.getElementById('dateInput').value = `${y}${m}${day}`;
  }

  document.getElementById('prev').onclick = () => {
    offset = Math.max(0, offset - 1);
    showImage();
  };
  document.getElementById('next').onclick = () => {
    offset = Math.min(daysSinceStart, offset + 1);
    showImage();
  };

  document.getElementById('dateInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') {
      const val = this.value.trim();
      if (/^\d{8}$/.test(val)) {
        const y = parseInt(val.slice(0,4),10);
        const m = parseInt(val.slice(4,6),10);
        const d = parseInt(val.slice(6,8),10);
        const inputDate = new Date(y, m-1, d);
        if (inputDate >= startDate && inputDate <= today) {
          offset = Math.floor((inputDate - startDate) / (1000*60*60*24));
          showImage();
        }
      }
    }
  });

  showImage();
</script>
